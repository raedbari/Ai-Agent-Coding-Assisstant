name: ai-coding-ci

on:
  push:
    branches:
      - main
    paths-ignore:
      - "k8s/**"
      - "argocd/**"
  workflow_dispatch:

concurrency:
  group: ai-coding-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sonar_scan:
    name: SonarQube Scan demo_projects
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify demo Sonar config
        run: |
          pwd
          ls -la
          test -f sonar-demo-project.properties
          cat sonar-demo-project.properties

      - name: Check SonarQube connectivity
        run: |
          curl -fsS --connect-timeout 10 "${{ secrets.SONAR_HOST_URL }}/api/system/status"

      - name: SonarQube Scan demo_projects only
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dproject.settings=sonar-demo-project.properties
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build_push_update_manifest:
    name: Build, Push, and Update GitOps Manifest
    runs-on: ubuntu-latest
    needs: sonar_scan
    timeout-minutes: 30

    env:
      IMAGE: raedbari/ai-coding-assistant
      TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Show current commit
        run: |
          echo "GitHub SHA: $GITHUB_SHA"
          git rev-parse HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run basic checks
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
          python -m compileall -q app
          python -m ruff check app

      - name: Verify static layout
        run: |
          test -f static/style.css

          if [ -d app/static ]; then
            echo "ERROR: Duplicate static folder found: app/static"
            echo "Use only static/ at repository root."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image without cache
        run: |
          docker build --pull --no-cache \
            -t ${IMAGE}:${TAG} \
            -t ${IMAGE}:latest \
            .

      - name: Smoke test Docker image
        run: |
          CONTAINER_NAME="ai-coding-test-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          docker rm -f "$CONTAINER_NAME" 2>/dev/null || true

          docker run -d \
            --name "$CONTAINER_NAME" \
            -p 18000:8000 \
            ${IMAGE}:${TAG}

          cleanup() {
            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
          }

          trap cleanup EXIT

          echo "Waiting for app to become ready..."

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:18000/health >/dev/null; then
              echo "App is healthy."
              break
            fi

            if [ "$i" -eq 30 ]; then
              echo "App did not become healthy in time."
              docker logs "$CONTAINER_NAME" || true
              exit 1
            fi

            sleep 2
          done

          curl -fsS http://127.0.0.1:18000/static/style.css > /tmp/style.css
          test -s /tmp/style.css

          echo "Static CSS is served successfully."

      - name: Push Docker image
        run: |
          docker push ${IMAGE}:${TAG}
          docker push ${IMAGE}:latest

      - name: Update Kubernetes image tag
        run: |
          sed -i "s|image: ${IMAGE}:.*|image: ${IMAGE}:${TAG}|g" k8s/deployment.yaml

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add k8s/deployment.yaml
          git commit -m "chore: update image to ${TAG} [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push

  argocd_refresh:
    name: Refresh ArgoCD Application
    runs-on: self-hosted
    needs: build_push_update_manifest
    timeout-minutes: 5

    steps:
      - name: Verify kubectl access
        run: |
          kubectl -n argocd get application ai-coding-assistant

      - name: Hard refresh ArgoCD application
        run: |
          kubectl -n argocd annotate application ai-coding-assistant \
            argocd.argoproj.io/refresh=hard --overwrite

      - name: Wait for ArgoCD sync and rollout
        run: |
          echo "Waiting for ArgoCD application to become Synced/Healthy..."

          for i in {1..60}; do
            SYNC_STATUS=$(kubectl -n argocd get application ai-coding-assistant \
              -o jsonpath='{.status.sync.status}')

            HEALTH_STATUS=$(kubectl -n argocd get application ai-coding-assistant \
              -o jsonpath='{.status.health.status}')

            echo "ArgoCD: sync=${SYNC_STATUS}, health=${HEALTH_STATUS}"

            if [ "$SYNC_STATUS" = "Synced" ] && [ "$HEALTH_STATUS" = "Healthy" ]; then
              break
            fi

            sleep 5
          done

          kubectl -n ai-coding rollout status deployment/ai-coding-assistant --timeout=180s

          echo "Current deployed image:"
          kubectl -n ai-coding get deployment ai-coding-assistant \
            -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'

