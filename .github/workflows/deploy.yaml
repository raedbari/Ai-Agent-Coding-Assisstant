name: ai-coding-ci

on:
  push:
    branches:
      - main
    paths-ignore:
      - "k8s/**"
      - "argocd/**"
  workflow_dispatch:

concurrency:
  group: ai-coding-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sonar_scan:
    name: SonarQube Scan
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check SonarQube connectivity
        run: |
          curl -fsS --connect-timeout 10 "${{ secrets.SONAR_HOST_URL }}/api/system/status"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build_push_update_manifest:
    name: Build, Push, and Update GitOps Manifest
    runs-on: ubuntu-latest
    needs: sonar_scan
    timeout-minutes: 30

    env:
      IMAGE: raedbari/ai-coding-assistant
      TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Show current commit
        run: |
          echo "GitHub SHA: $GITHUB_SHA"
          git rev-parse HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run basic checks
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
          python -m compileall -q app
          python -m ruff check app

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Verify served CSS before Docker build
        run: |
          echo "Checking served CSS in GitHub Actions workspace:"
          grep -n 'THEME_VERSION\|--bg:\|--panel:\|--primary:' static/style.css || true
          grep -q 'THEME_VERSION: mossgreen-oldlace-iris-v6' static/style.css
          grep -q '#2f3822' static/style.css
          grep -q '#FDF5E6' static/style.css
          grep -q '#5D3FD3' static/style.css

      - name: Build Docker image without cache
        run: |
          docker build --pull --no-cache \
            -t ${IMAGE}:${TAG} \
            -t ${IMAGE}:latest \
            .

      - name: Verify served CSS inside Docker image
        run: |
          echo "Checking served CSS inside built Docker image:"
          docker run --rm ${IMAGE}:${TAG} sh -c "grep -n 'THEME_VERSION\|--bg:\|--panel:\|--primary:' /app/static/style.css || true"
          docker run --rm ${IMAGE}:${TAG} sh -c "grep -q 'THEME_VERSION: mossgreen-oldlace-iris-v6' /app/static/style.css"
          docker run --rm ${IMAGE}:${TAG} sh -c "grep -q '#2f3822' /app/static/style.css"
          docker run --rm ${IMAGE}:${TAG} sh -c "grep -q '#FDF5E6' /app/static/style.css"
          docker run --rm ${IMAGE}:${TAG} sh -c "grep -q '#5D3FD3' /app/static/style.css"

      - name: Push Docker image
        run: |
          docker push ${IMAGE}:${TAG}
          docker push ${IMAGE}:latest

      - name: Update Kubernetes image tag
        run: |
          sed -i "s|image: ${IMAGE}:.*|image: ${IMAGE}:${TAG}|g" k8s/deployment.yaml

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add k8s/deployment.yaml
          git commit -m "chore: update image to ${TAG} [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push