```yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-coding-assistant
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/raedbari/Ai-Agent-Coding-Assisstant.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: ai-coding

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
```
