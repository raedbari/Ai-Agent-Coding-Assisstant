apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-coding-assistant
  namespace: ai-coding
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: ai-coding-assistant
  template:
    metadata:
      labels:
        app: ai-coding-assistant
    spec:
      containers:
        - name: ai-coding-assistant
          image: raedbari/ai-coding-assistant:c57a4ea07c77bf885d358840393008a0d06f2d11
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000

