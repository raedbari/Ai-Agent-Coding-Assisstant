apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-coding-assistant
  namespace: ai-coding
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: ai-coding-assistant
  template:
    metadata:
      labels:
        app: ai-coding-assistant
    spec:
      containers:
        - name: ai-coding-assistant
          image: raedbari/ai-coding-assistant:edf4ae57cf993f5af71a8c3329935e066d63085f
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

